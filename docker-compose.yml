services:
  librosfera-backend:
    build: ./Backend
    container_name: librosfera-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
    volumes:
      - ./Backend/uploads:/app/uploads   # imágenes subidas, persisten entre deploys
    networks:
      - web

networks:
  web:
    external: true