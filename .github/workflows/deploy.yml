name: Deploy Librosfera

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/librosfera

            git pull origin master

            # Rebuild frontend estático con variables de producción
            cd Frontend/login-app
            REACT_APP_BASE_URL=https://librosfera.jerik.dev \
            REACT_APP_FRONT_URL=https://librosfera.jerik.dev \
            npm ci --prefer-offline && npm run build

            # Rebuild y restart backend Docker
            cd ~/apps/librosfera
            docker compose up -d --build
            docker image prune -f

            echo "✅ Librosfera deployed"