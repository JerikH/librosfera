name: Deploy Librosfera

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/librosfera
            git pull origin master

            cd Frontend/login-app
            REACT_APP_BASE_URL=https://librosfera.jerik.dev \
            REACT_APP_FRONT_URL=https://librosfera.jerik.dev \
            PUBLIC_URL=/ \
            REACT_APP_GA_MEASUREMENT_ID=G-KBB25SJTMD \
            npm ci --prefer-offline && npm run build

            cd ~/apps/librosfera
            docker compose up -d --build
            docker image prune -f

            sleep 8
            curl -sf https://librosfera.jerik.dev/api/sitemap.xml \
              -o ~/apps/librosfera/Frontend/login-app/build/sitemap.xml \
              || echo "⚠️  Sitemap fetch failed, static file not updated"

            echo "✅ Librosfera deployed"